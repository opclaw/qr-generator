<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d946ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#gradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="white" fill-opacity="0.05"/>
  <circle cx="1100" cy="530" r="200" fill="white" fill-opacity="0.05"/>
  
  <!-- Main content group -->
  <g transform="translate(600, 315)" text-anchor="middle">
    <!-- Icon -->
    <text x="0" y="-120" font-size="120" fill="white" opacity="0.95">📱</text>
    
    <!-- Title -->
    <text x="0" y="30" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="bold" fill="white">QR Code Generator</text>
    
    <!-- Subtitle -->
    <text x="0" y="100" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="500" fill="white" fill-opacity="0.9">Create QR Codes Instantly</text>
    
    <!-- Brand -->
    <text x="0" y="200" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="600" fill="white" fill-opacity="0.7" letter-spacing="3">SmartOK Tools</text>
  </g>
</svg>